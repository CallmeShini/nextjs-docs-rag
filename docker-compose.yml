services:
  api:
    build:
      context: ./api
    env_file:
      - ./api/.env
    environment:
      CHROMA_PATH: /app/data/chroma_db
      NEXTJS_REPO_PATH: /app/data/nextjs-repo
      BM25_CORPUS_PATH: /app/data/bm25_corpus.json
      CHUNKS_PATH: /app/data/chunks.json
      AUTO_INGEST_ON_BOOT: "true"
      PRELOAD_MODELS_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    volumes:
      - arag_data:/app/data
      - arag_model_cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 240s
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  arag_data:
    name: multimodal_rag_arag_backend_data
  arag_model_cache:
    name: multimodal_rag_arag_hf_cache
